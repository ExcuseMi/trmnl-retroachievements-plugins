---
strategy: polling
no_screen_padding: 'no'
dark_mode: 'no'
static_data: ''
polling_verb: get
framework_version: 2.3.7
serverless_language: node
polling_url: ''
polling_headers: ''
polling_body: ''
id: 176378
oauth_enabled: 'false'
oauth_pkce_enabled: 'no'
oauth_authorize_url: ''
oauth_token_url: ''
oauth_scopes: ''
oauth_scope_separator: ''
oauth_refresh_url: ''
oauth_auth_params: ''
oauth_token_headers: ''
oauth_token_site: ''
oauth_token_params: ''
oauth_token_request_auth_method: ''
oauth_body_format: ''
oauth_token_response_metadata: ''
oauth_authorization_method: ''
oauth_refresh_params: ''
oauth_token_field_name: ''
oauth_expiry_field_name: ''
oauth_expiry_strategy: ''
oauth_fixed_expiry_ms: ''
custom_fields:
- keyname: about
  name: About This Plugin
  field_type: author_bio
  description: Unofficial <b>RetroAchievements</b> plugin displaying a users <b>recent games</b>.
  github_url: https://github.com/ExcuseMi/trmnl-retroachievements-plugins
  learn_more_url: https://retroachievements.org/
  help_text: TRMNL X Ready
- keyname: api_key
  field_type: string
  name: Retro Achievements Web API Key
  optional: true
  description: You can find your <b>Web API Key</b> under <b>Authentication</b> in your <b><a href="https://retroachievements.org/RetroAchievement settings">RetroAchievement settings</a></b>
  placeholder: RetroAchievements API Key
- keyname: username
  field_type: string
  name: Target username or ULID
  description: Target username or ULID
  placeholder: username or ULID
- keyname: artstyle
  field_type: select
  options:
  - Icon
  - Title
  - Ingame
  - BoxArt
  default: icon
  name: Artstyle
  description: Select the artstyle
- keyname: hardcore_only
  field_type: select
  options:
  - 'No'
  - 'Yes'
  default: 'No'
  name: Hardcore only
  description: Only show achievements and points achieved without additional emulator features.
- keyname: include_points
  field_type: select
  options:
  - 'Yes'
  - 'No'
  default: 'Yes'
  name: Include points
  description: Include the points progress bar
name: 'RetroAchievements: Recent Games'
refresh_interval: 15
