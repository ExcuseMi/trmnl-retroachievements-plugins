# TRMNLP configuration
# {{ env.VARIABLE }} interpolation is available here
---
# auto-reload when files change (`watch: false` to disable)
watch:
  - .trmnlp.yml
  - src

# values of custom fields (defined in src/settings.yml)
custom_fields:
  api_key: ''
  username: Kushy96
  artstyle: icon
  hardcore_only: 'No'
  include_points: 'Yes'

# override variables
variables:
  trmnl:
    system:
      timestamp_utc: 1700000000
    user:
      locale: en
    plugin_settings:
      instance_name: 'RetroAchievements: Recent Games'
      strategy: polling
      dark_mode: 'no'
      no_screen_padding: 'no'
      custom_fields_values:
        api_key: ''
        username: Kushy96
        artstyle: icon
        hardcore_only: 'No'
        include_points: 'Yes'

  # Mirrors what src/transform.js's run() returns — set `error` to a string
  # (and IDX_0/IDX_1 to null) to preview the error state instead.
  error: null
  IDX_0:
    User: Kushy96
    UserPic: /UserPic/Kushy96.png
    RecentAchievements:
